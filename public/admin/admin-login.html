<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - TECHNO CONTROL</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <div class="lock-icon">🔐</div>
            <h1>لوحة التحكم الإدارية</h1>
            <p class="subtitle">TECHNO-PRINT Control Room</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="adminUsername" placeholder="أدخل اسم المستخدم" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="adminPassword" placeholder="أدخل كلمة المرور" required>
                </div>
                <button type="submit" class="login-btn">تسجيل الدخول</button>
            </form>
            <p class="error-msg" id="loginError"></p>
        </div>
    </div>

    <script src="admin-login.js"></script>
</body>
</html>
