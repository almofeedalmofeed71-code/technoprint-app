<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHNO-CONTROL - Direct Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0A0A; color: white; font-family: Arial, sans-serif; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #111; border-radius: 15px; margin-bottom: 30px; }
        .header h1 { color: #D4AF37; font-size: 24px; }
        .status { padding: 8px 15px; background: #2ECC71; border-radius: 20px; font-size: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1a1a; padding: 25px; border-radius: 15px; text-align: center; border: 2px solid #333; }
        .stat-card .icon { font-size: 40px; margin-bottom: 10px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #D4AF37; }
        .stat-card .label { color: #888; font-size: 14px; margin-top: 8px; }
        .section { background: #1a1a1a; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .section h2 { color: #D4AF37; margin-bottom: 20px; font-size: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #333; }
        th { background: #222; color: #D4AF37; }
        tr:hover { background: #252525; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; margin: 5px; }
        .btn-gold { background: #D4AF37; color: black; }
        .btn-red { background: #E74C3C; color: white; }
        .btn-green { background: #2ECC71; color: white; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #D4AF37; color: black; padding: 15px 30px; border-radius: 10px; display: none; z-index: 9999; font-weight: bold; }
        .toast.show { display: block; }
        .loading { text-align: center; padding: 60px; font-size: 24px; color: #888; }
        .error { color: #E74C3C; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ TECHNO-CONTROL v13</h1>
            <div style="display: flex; gap: 20px; align-items: center;">
                <span id="connectionStatus" class="status">🔄 جاري الاتصال...</span>
                <span style="color: #D4AF37;">👑 hseenop33</span>
            </div>
        </div>
        
        <div id="loadingMessage" class="loading">
            ⏳ جاري تحميل البيانات من Supabase...
        </div>
        
        <div id="errorMessage" class="error" style="display: none;"></div>
        
        <div id="dashboardContent" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon">👥</div>
                    <div class="value" id="totalUsers">-</div>
                    <div class="label">إجمالي المستخدمين</div>
                </div>
                <div class="stat-card">
                    <div class="icon">💰</div>
                    <div class="value" id="totalBalance">-</div>
                    <div class="label">إجمالي الأرصدة</div>
                </div>
                <div class="stat-card">
                    <div class="icon">📄</div>
                    <div class="value" id="totalPages">-</div>
                    <div class="label">إجمالي الصفحات</div>
                </div>
                <div class="stat-card">
                    <div class="icon">✅</div>
                    <div class="value" id="totalActive">-</div>
                    <div class="label">نشط</div>
                </div>
            </div>
            
            <div class="section">
                <h2>👥 المستخدمين من قاعدة البيانات</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الاسم</th>
                                <th>الهاتف</th>
                                <th>المحافظة</th>
                                <th>الرصيد</th>
                                <th>الصفحات</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                            <tr><td colspan="7" style="text-align: center; padding: 20px;">جاري التحميل...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="section">
                <h2>⚙️ الخدمات</h2>
                <div id="servicesList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;">
                    <p style="color: #888; text-align: center; padding: 30px;">جاري التحميل...</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <!-- Load supabase-js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
    // ===== TECHNO-CONTROL v13 - DIRECT ACCESS =====
    // Hard bypass for hseenop33 - NO SERVER CHECK NEEDED
    
    const SUPABASE_URL = 'https://rqzsokvhgjlftkouhphb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxenNva3ZoZ2psZnRrb3VocGhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NjUyNDcsImV4cCI6MjA5MTA0MTI0N30.2VJpfOpCUp_Mr9ot00qH0nhLmIIfUy3Rr5TQ5GOgjbY';
    
    let supabase = null;
    let users = [];
    let services = [];
    
    // Initialize
    async function init() {
        console.log('🚀 TECHNO-CONTROL v13 DIRECT ACCESS');
        
        try {
            // Wait for supabase to load
            let attempts = 0;
            while (typeof window.supabase === 'undefined' && attempts < 30) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            
            if (typeof window.supabase === 'undefined') {
                throw new Error('❌ supabase-js failed to load');
            }
            
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase client created');
            
            // Set admin token
            localStorage.setItem('adminToken', 'admin-db-hseenop33');
            localStorage.setItem('adminUser', JSON.stringify({ username: 'hseenop33', role: 'admin' }));
            
            updateStatus('✅ متصل');
            showToast('✅ لوحة التحكم جاهزة');
            
            // Load data
            await loadAllData();
            
        } catch (err) {
            console.error('❌ Init error:', err);
            updateStatus('❌ خطأ');
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').innerHTML = `
                <h3>⚠️ خطأ في الاتصال</h3>
                <p>${err.message}</p>
                <button class="btn btn-gold" onclick="location.reload()">🔄 إعادة المحاولة</button>
            `;
        }
    }
    
    async function loadAllData() {
        try {
            // Fetch users
            const { data: usersData, error: usersError } = await supabase
                .from('profiles')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (usersError) {
                console.error('Users error:', usersError);
                document.getElementById('usersTable').innerHTML = `
                    <tr><td colspan="7" style="color: #E74C3C; text-align: center;">
                        ❌ خطأ في تحميل المستخدمين: ${usersError.message}
                    </td></tr>
                `;
            } else {
                users = usersData || [];
                console.log(`✅ ${users.length} users loaded`);
                renderUsers();
            }
            
            // Fetch services
            const { data: servicesData, error: servicesError } = await supabase
                .from('services')
                .select('*')
                .order('order_index', { ascending: true });
            
            if (servicesError) {
                console.error('Services error:', servicesError);
            } else {
                services = servicesData || [];
                console.log(`✅ ${services.length} services loaded`);
                renderServices();
            }
            
            // Update stats
            updateStats();
            
            // Show dashboard
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            
        } catch (err) {
            console.error('❌ Load error:', err);
        }
    }
    
    function updateStats() {
        const total = users.length;
        const balance = users.reduce((s, u) => s + (parseInt(u?.balance_iqd || u?.balance || 0)), 0);
        const pages = users.reduce((s, u) => s + (parseInt(u?.pages_count || u?.pages || 0)), 0);
        const active = users.filter(u => u?.status === 'active').length;
        
        document.getElementById('totalUsers').textContent = total;
        document.getElementById('totalBalance').textContent = balance.toLocaleString() + ' IQD';
        document.getElementById('totalPages').textContent = pages.toLocaleString();
        document.getElementById('totalActive').textContent = active;
    }
    
    function renderUsers() {
        const tbody = document.getElementById('usersTable');
        
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 30px; color: #888;">لا توجد مستخدمين</td></tr>';
            return;
        }
        
        tbody.innerHTML = users.map((u, i) => `
            <tr>
                <td>${i + 1}</td>
                <td style="color: #D4AF37;">${u?.username || u?.name || 'غير معروف'}</td>
                <td>${u?.phone || '-'}</td>
                <td>${u?.governorate || u?.city || '-'}</td>
                <td style="color: #2ECC71;">${(u?.balance_iqd || u?.balance || 0).toLocaleString()} IQD</td>
                <td>${u?.pages_count || u?.pages || 0}</td>
                <td>
                    <span style="padding: 5px 12px; border-radius: 15px; font-size: 11px; background: ${u?.status === 'active' ? '#2ECC71' : '#888'}20; color: ${u?.status === 'active' ? '#2ECC71' : '#888'};">
                        ${u?.status === 'active' ? '✅ نشط' : '⏳ غير نشط'}
                    </span>
                </td>
            </tr>
        `).join('');
    }
    
    function renderServices() {
        const container = document.getElementById('servicesList');
        
        if (services.length === 0) {
            container.innerHTML = '<p style="color: #888; text-align: center; padding: 30px;">لا توجد خدمات</p>';
            return;
        }
        
        container.innerHTML = services.map(s => `
            <div style="background: #252525; padding: 20px; border-radius: 12px; text-align: center; border: 2px solid #333;">
                <div style="font-size: 40px; margin-bottom: 10px;">${s?.icon || '📄'}</div>
                <h4 style="color: #D4AF37; margin-bottom: 10px;">${s?.name || 'خدمة'}</h4>
                <div style="color: #2ECC71; font-size: 20px; font-weight: bold;">${(s?.price || 0).toLocaleString()} IQD</div>
                <span style="display: inline-block; margin-top: 10px; padding: 5px 15px; border-radius: 15px; font-size: 11px; background: ${s?.status === 'active' ? '#2ECC71' : '#E74C3C'}20; color: ${s?.status === 'active' ? '#2ECC71' : '#E74C3C'};">
                    ${s?.status === 'active' ? '✅ نشط' : '🚫 متوقف'}
                </span>
            </div>
        `).join('');
    }
    
    function updateStatus(text) {
        document.getElementById('connectionStatus').textContent = text;
        document.getElementById('connectionStatus').style.background = text.includes('❌') ? '#E74C3C' : '#2ECC71';
    }
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // Start
    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
