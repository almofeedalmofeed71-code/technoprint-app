<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHOPRINT 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/ui-fonts.css">
    <link rel="stylesheet" href="css/ui-colors.css">
    <link rel="stylesheet" href="css/ui-glass.css">
    <link rel="stylesheet" href="css/ui-header.css">
    <link rel="stylesheet" href="css/ui-buttons.css">
    <link rel="stylesheet" href="css/ui-cards.css">
    <link rel="stylesheet" href="css/ui-inputs.css">
    <link rel="stylesheet" href="css/ui-modals.css">
    <link rel="stylesheet" href="css/ui-vertical-lang.css">
    <link rel="stylesheet" href="css/slider-ui.css">
    <link rel="stylesheet" href="css/gates-gallery.css">
    <link rel="stylesheet" href="css/student-portal.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive-core.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="brand">
            <div class="brand-logo">ت</div>
            <span class="brand-name">TECHOPRINT 2026</span>
        </div>
        <div class="header-wallet" onclick="Nav.go('wallet')">
            <i class="fas fa-wallet"></i>
            <span id="headerBalance">0 IQD</span>
        </div>
    </header>

    <!-- Language Bar (Right Side) -->
    <nav id="language-bar" class="language-bar">
        <button class="lang-btn active" data-lang="ar" onclick="I18n.set('ar')">عربي</button>
        <button class="lang-btn" data-lang="ku" onclick="I18n.set('ku')">کوردی</button>
        <button class="lang-btn" data-lang="en" onclick="I18n.set('en')">English</button>
    </nav>

    <!-- Central Ad Slider -->
    <section id="slider" class="slider-section">
        <div class="slider-container">
            <div class="slide">
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=1" alt="Ad 1"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=2" alt="Ad 2"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=3" alt="Ad 3"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=4" alt="Ad 4"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=5" alt="Ad 5"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=6" alt="Ad 6"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=7" alt="Ad 7"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=8" alt="Ad 8"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=9" alt="Ad 9"></div>
            </div>
        </div>
        <div class="slider-nav">
            <div class="slider-dot active"></div>
            <div class="slider-dot"></div>
            <div class="slider-dot"></div>
        </div>
    </section>

    <!-- Master Portal (3 Gate Cards) -->
    <section id="masterPortal" class="gates-section" style="display:none;">
        <div class="gate-row">
            <div class="gate-card" onclick="showMainDashboard()">
                <div class="gate-bg" style="background:linear-gradient(135deg,#1a1a2e,#16213e);"></div>
                <div class="gate-content">
                    <div class="gate-icon">🎓</div>
                    <h3 class="gate-title" data-i18n="student_gate">بوابة الطالب</h3>
                    <p class="gate-desc" data-i18n="student_desc">ادارة طلباتك ومتابعة الطباعة</p>
                </div>
            </div>
            <div class="gate-card" onclick="showMainDashboard()">
                <div class="gate-bg" style="background:linear-gradient(135deg,#0d3b2e,#1a5e3f);"></div>
                <div class="gate-content">
                    <div class="gate-icon">💰</div>
                    <h3 class="gate-title" data-i18n="wallet_gate">المحفظة</h3>
                    <p class="gate-desc" data-i18n="wallet_desc">ادارة رصيدك وتحويل الاموال</p>
                </div>
            </div>
            <div class="gate-card" onclick="openModal('loginModal')">
                <div class="gate-bg" style="background:linear-gradient(135deg,#3b1a1a,#5e1a1a);"></div>
                <div class="gate-content">
                    <div class="gate-icon"><i class="fas fa-sign-in-alt"></i></div>
                    <h3 class="gate-title" data-i18n="login_gate">تسجيل الدخول</h3>
                    <p class="gate-desc" data-i18n="login_desc">ادخل حسابك او انشئ جديد</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Student Dashboard -->
    <section id="app" class="dashboard-section" style="display:none;">
        <main id="pageContent" class="page-content">
            <div class="service-grid">
                <div class="service-card" onclick="Nav.go('orders')">
                    <div class="service-icon">📦</div>
                    <p class="service-title" data-i18n="my_orders">طلباتي</p>
                </div>
                <div class="service-card" onclick="Nav.go('wallet')">
                    <div class="service-icon">💰</div>
                    <p class="service-title" data-i18n="wallet_nav">المحفظة</p>
                </div>
                <div class="service-card" onclick="Nav.go('library')">
                    <div class="service-icon">📚</div>
                    <p class="service-title" data-i18n="library_nav">المكتبة</p>
                </div>
                <div class="service-card" onclick="Nav.go('tracking')">
                    <div class="service-icon">📍</div>
                    <p class="service-title" data-i18n="track_nav">التتبع</p>
                </div>
                <div class="service-card" onclick="Nav.go('printing')">
                    <div class="service-icon">🖨️</div>
                    <p class="service-title" data-i18n="print_nav">الطباعة</p>
                </div>
                <div class="service-card" onclick="Nav.go('support')">
                    <div class="service-icon">🔧</div>
                    <p class="service-title" data-i18n="support_nav">الدعم</p>
                </div>
                <div class="service-card" onclick="Nav.go('teacher')">
                    <div class="service-icon">👨‍🏫</div>
                    <p class="service-title" data-i18n="teacher_nav">المعلم</p>
                </div>
                <div class="service-card" onclick="Nav.go('inks')">
                    <div class="service-icon">🎨</div>
                    <p class="service-title" data-i18n="inks_nav">الحبر</p>
                </div>
                <div class="service-card" onclick="openModal('loginModal')">
                    <div class="service-icon">⚙️</div>
                    <p class="service-title" data-i18n="settings_nav">الاعدادات</p>
                </div>
            </div>
        </main>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn" onclick="navigateTo('dashboard')">
            <i class="fas fa-home"></i>
            <span data-i18n="home">الرئيسية</span>
        </button>
        <button class="nav-btn" onclick="navigateTo('wallet')">
            <i class="fas fa-wallet"></i>
            <span data-i18n="wallet_btn">المحفظة</span>
        </button>
        <button class="nav-btn" onclick="navigateTo('library')">
            <i class="fas fa-book"></i>
            <span data-i18n="library_btn">المكتبة</span>
        </button>
        <button class="nav-btn" onclick="navigateTo('orders')">
            <i class="fas fa-box"></i>
            <span data-i18n="orders_btn">طلباتي</span>
        </button>
    </nav>

    <!-- Login Modal -->
    <div id="loginModal" class="modal" style="display:none;">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('loginModal')"><i class="fas fa-times"></i></button>
            <h2 data-i18n="login_title">تسجيل الدخول</h2>
            <form id="loginForm">
                <input type="email" class="input-field" placeholder="البريد الالكتروني" required>
                <input type="password" class="input-field" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-gold" data-i18n="login_btn">دخول</button>
            </form>
        </div>
    </div>

    <!-- Splash Screen -->
    <div id="splashScreen" class="splash">
        <div class="splash-logo">ت</div>
        <p class="splash-text">TECHOPRINT 2026</p>
    </div>

    <!-- Preloader -->
    <div id="preloader" class="preloader hidden">
        <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/slider.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
