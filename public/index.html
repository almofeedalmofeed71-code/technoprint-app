<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHOPRINT 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/ui-fonts.css">
    <link rel="stylesheet" href="css/ui-colors.css">
    <link rel="stylesheet" href="css/ui-glass.css">
    <link rel="stylesheet" href="css/ui-header.css">
    <link rel="stylesheet" href="css/ui-buttons.css">
    <link rel="stylesheet" href="css/ui-cards.css">
    <link rel="stylesheet" href="css/ui-inputs.css">
    <link rel="stylesheet" href="css/ui-modals.css">
    <link rel="stylesheet" href="css/ui-vertical-lang.css">
    <link rel="stylesheet" href="css/slider-ui.css">
    <link rel="stylesheet" href="css/student-portal.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive-core.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="brand">
            <div class="brand-logo"></div>
            <span class="brand-name">TECHOPRINT</span>
        </div>
        <div class="header-actions">
            <div class="header-notif" id="btn-notification" onclick="showNotification()">
                <i class="fas fa-bell"></i>
                <span class="notif-badge">3</span>
            </div>
            <div class="header-wallet" id="btn-wallet" onclick="Nav.go('wallet')">
                <i class="fas fa-wallet"></i>
                <span id="headerBalance">0 IQD</span>
            </div>
        </div>
    </header>

    <!-- Language Bar -->
    <nav id="language-bar" class="language-bar">
        <button class="lang-btn active" data-lang="ar" onclick="I18n.set('ar')">عربي</button>
        <button class="lang-btn" data-lang="ku" onclick="I18n.set('ku')">کوردی</button>
        <button class="lang-btn" data-lang="en" onclick="I18n.set('en')">English</button>
    </nav>

    <!-- Central Ad Slider - 3x3 Grid -->
    <section id="slider" class="slider-section">
        <div class="slider-container">
            <div class="slide">
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=1" alt="Ad 1"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=2" alt="Ad 2"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=3" alt="Ad 3"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=4" alt="Ad 4"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=5" alt="Ad 5"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=6" alt="Ad 6"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=7" alt="Ad 7"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=8" alt="Ad 8"></div>
                <div class="slide-block"><img src="https://picsum.photos/400/300?random=9" alt="Ad 9"></div>
            </div>
        </div>
        <div class="slide-nav">
            <div class="slider-dot active"></div>
            <div class="slider-dot"></div>
            <div class="slider-dot"></div>
        </div>
    </section>

    <!-- Master Portal -->
    <section id="masterPortal" class="gates-section" style="display:none;">
        <div class="gate-row">
            <div class="gate-card" id="btn-student" onclick="showMainDashboard()">
                <div class="gate-bg" style="background:linear-gradient(135deg,#1a1a2e,#16213e);"></div>
                <div class="gate-content">
                    <div class="gate-icon">🎓</div>
                    <h3>بوابة الطالب</h3>
                </div>
            </div>
            <div class="gate-card" id="btn-wallet-gate" onclick="Nav.go('wallet')">
                <div class="gate-bg" style="background:linear-gradient(135deg,#0d3b2e,#1a5e3f);"></div>
                <div class="gate-content">
                    <div class="gate-icon">💰</div>
                    <h3>المحفظة</h3>
                </div>
            </div>
            <div class="gate-card" id="btn-login-gate" onclick="openModal('loginModal')">
                <div class="gate-bg" style="background:linear-gradient(135deg,#3b1a1a,#5e1a1a);"></div>
                <div class="gate-content">
                    <div class="gate-icon"><i class="fas fa-sign-in-alt"></i></div>
                    <h3>تسجيل الدخول</h3>
                </div>
            </div>
        </div>
    </section>

    <!-- Student Dashboard -->
    <section id="app" class="dashboard-section">
        <main id="pageContent" class="page-content">
            <div class="service-grid">
                <div class="service-card" id="btn-orders" onclick="Nav.go('orders')">
                    <div class="service-icon">📦</div>
                    <p class="service-title">طلباتي</p>
                </div>
                <div class="service-card" id="btn-wallet-nav" onclick="Nav.go('wallet')">
                    <div class="service-icon">💰</div>
                    <p class="service-title">المحفظة</p>
                </div>
                <div class="service-card" id="btn-library" onclick="Nav.go('library')">
                    <div class="service-icon">📚</div>
                    <p class="service-title">المكتبة</p>
                </div>
                <div class="service-card" id="btn-tracking" onclick="Nav.go('tracking')">
                    <div class="service-icon">📍</div>
                    <p class="service-title">التتبع</p>
                </div>
                <div class="service-card" id="btn-printing" onclick="Nav.go('printing')">
                    <div class="service-icon">🖨️</div>
                    <p class="service-title">الطباعة</p>
                </div>
                <div class="service-card" id="btn-support" onclick="Nav.go('support')">
                    <div class="service-icon">🔧</div>
                    <p class="service-title">الدعم</p>
                </div>
                <div class="service-card" id="btn-teacher" onclick="Nav.go('teacher')">
                    <div class="service-icon">👨‍🏫</div>
                    <p class="service-title">المعلم</p>
                </div>
                <div class="service-card" id="btn-inks" onclick="Nav.go('inks')">
                    <div class="service-icon">🎨</div>
                    <p class="service-title">الحبر</p>
                </div>
                <div class="service-card" id="btn-settings" onclick="openModal('loginModal')">
                    <div class="service-icon">⚙️</div>
                    <p class="service-title">الاعدادات</p>
                </div>
            </div>
        </main>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn" id="nav-home" onclick="navigateTo('dashboard')">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </button>
        <button class="nav-btn" id="nav-wallet" onclick="navigateTo('wallet')">
            <i class="fas fa-wallet"></i>
            <span>المحفظة</span>
        </button>
        <button class="nav-btn" id="nav-library" onclick="navigateTo('library')">
            <i class="fas fa-book"></i>
            <span>المكتبة</span>
        </button>
        <button class="nav-btn" id="nav-orders" onclick="navigateTo('orders')">
            <i class="fas fa-box"></i>
            <span>طلباتي</span>
        </button>
    </nav>

    <!-- Login Modal -->
    <div id="loginModal" class="modal" style="display:none;">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('loginModal')"><i class="fas fa-times"></i></button>
            <h2>تسجيل الدخول</h2>
            <form id="loginForm" onsubmit="return Auth.login(this.email.value, this.password.value)">
                <input type="email" name="email" class="input-field" placeholder="البريد الالكتروني" required>
                <input type="password" name="password" class="input-field" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-gold">دخول</button>
            </form>
            <p style="text-align:center;margin-top:15px;color:#D4AF37;cursor:pointer;" onclick="toggleRegister()">إنشاء حساب جديد</p>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal" style="display:none;">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('registerModal')"><i class="fas fa-times"></i></button>
            <h2>إنشاء حساب</h2>
            <form id="registerForm" onsubmit="return handleRegister(this)">
                <input type="text" name="fullName" class="input-field" placeholder="الاسم الكامل" required>
                <input type="text" name="username" class="input-field" placeholder="اسم المستخدم" required>
                <input type="email" name="email" class="input-field" placeholder="البريد الالكتروني" required>
                <input type="tel" name="phone" class="input-field" placeholder="رقم الهاتف" required>
                <select name="governorate" class="input-field" required>
                    <option value="">اختر المحافظة</option>
                    <option value="baghdad">بغداد</option>
                    <option value="basra">البصرة</option>
                    <option value="erbil">أربيل</option>
                    <option value="duhok">دهوك</option>
                    <option value="sulaymaniyah">السليمانية</option>
                </select>
                <input type="text" name="address" class="input-field" placeholder="العنوان">
                <input type="password" name="password" class="input-field" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-gold">تسجيل</button>
            </form>
            <p style="text-align:center;margin-top:15px;color:#D4AF37;cursor:pointer;" onclick="toggleRegister()">لديك حساب؟</p>
        </div>
    </div>

    <!-- Splash Screen -->
    <div id="splashScreen" class="splash">
        <div class="splash-logo">T</div>
        <p class="splash-text">TECHOPRINT 2026</p>
        <p class="splash-welcome">Welcome to the Empire</p>
    </div>

    <!-- Preloader -->
    <div id="preloader" class="preloader hidden">
        <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <!-- Scripts -->
    <script src="js/eng-i18n.js"></script>
    <script src="js/eng-navigation.js"></script>
    <script src="js/eng-slider.js"></script>
    <script src="js/eng-auth.js"></script>
    <script src="js/app-init.js"></script>
</body>
</html>
